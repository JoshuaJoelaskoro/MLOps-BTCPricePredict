# ============================================================
# MLOps BTC Price Prediction — Project Configuration
# ============================================================

project:
  name: "MLOps-BTCPricePredict"
  version: "0.1.0"
  description: "Bitcoin daily price direction prediction with continuous training"

data:
  source: "coingecko_api"
  base_url: "https://api.coingecko.com/api/v3"
  coin_id: "bitcoin"
  vs_currency: "usd"
  fetch_interval_hours: 24
  rolling_window_days: 730

features:
  return_windows: [1, 3, 7, 14]
  ma_windows: [7, 14, 30]
  volatility_windows: [7, 14]
  target_column: "direction"

model:
  algorithm: "random_forest"
  test_size: 0.2
  random_state: 42
  hyperparameters:
    random_forest:
      n_estimators: 100
      max_depth: 10
      min_samples_split: 5

evaluation:
  primary_metric: "f1_score"
  threshold_f1: 0.60
  performance_drop_pct: 0.05
  volatility_spike_multiplier: 2.0

paths:
  raw_data: "data/raw/"
  processed_data: "data/processed/"
  models: "models/trained/"
  registry: "models/registry/"
  notebooks: "notebooks/"
  logs: "logs/"